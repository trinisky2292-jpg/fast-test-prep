<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST Test Prep — Sign In</title>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --accent: #FFC107;
            --background: #F5F5F5;
            --text: #212121;
            --light-text: #757575;
            --white: #ffffff;
            --error: #F44336;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4CAF50 0%, #2196F3 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-card {
            background: var(--white);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 420px;
        }
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .logo h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }
        .logo p {
            font-size: 0.95rem;
            color: var(--light-text);
        }
        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: var(--light-text);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.85rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }
        .submit-btn:hover { background: #43a047; }
        .submit-btn:disabled {
            background: var(--light-text);
            cursor: not-allowed;
        }
        .error-msg {
            background: #ffebee;
            color: var(--error);
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .error-msg.show { display: block; }
        .small-note {
            text-align: center;
            font-size: 0.85rem;
            color: var(--light-text);
            margin-top: 1rem;
        }
        .small-note a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">📚</div>
            <h1>FAST Test Prep</h1>
            <p>5th Grade Practice</p>
        </div>

        <div class="tabs">
            <div class="tab active" id="tab-login" data-tab="login">Sign In</div>
            <div class="tab" id="tab-signup" data-tab="signup">Create Account</div>
        </div>

        <div class="error-msg" id="error-msg"></div>

        <form id="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="your username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="your password" autocomplete="current-password" required>
            </div>
            <div class="form-group" id="confirm-group" style="display:none;">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="type password again" autocomplete="new-password">
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
        </form>

        <p class="small-note" id="footer-note">
            New here? <a href="#" id="switch-to-signup">Create an account</a>
        </p>
    </div>

    <script>
    (function() {
        let mode = 'login';

        const setMode = (newMode) => {
            mode = newMode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
            document.getElementById('confirm-group').style.display = mode === 'signup' ? 'block' : 'none';
            document.getElementById('submit-btn').textContent = mode === 'signup' ? 'Create Account' : 'Sign In';
            document.getElementById('password').setAttribute('autocomplete', mode === 'signup' ? 'new-password' : 'current-password');
            document.getElementById('footer-note').innerHTML = mode === 'signup'
                ? 'Already have an account? <a href="#" id="switch-to-login">Sign in</a>'
                : 'New here? <a href="#" id="switch-to-signup">Create an account</a>';
            wireFooterLinks();
            hideError();
        };

        const wireFooterLinks = () => {
            const su = document.getElementById('switch-to-signup');
            const si = document.getElementById('switch-to-login');
            if (su) su.addEventListener('click', (e) => { e.preventDefault(); setMode('signup'); });
            if (si) si.addEventListener('click', (e) => { e.preventDefault(); setMode('login'); });
        };

        document.getElementById('tab-login').addEventListener('click', () => setMode('login'));
        document.getElementById('tab-signup').addEventListener('click', () => setMode('signup'));
        wireFooterLinks();

        const showError = (msg) => {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('show');
        };
        const hideError = () => document.getElementById('error-msg').classList.remove('show');

        // Simple hash (NOT real security — just so passwords aren't plaintext in localStorage)
        const hashPassword = async (password) => {
            const enc = new TextEncoder().encode(password);
            const buf = await crypto.subtle.digest('SHA-256', enc);
            return Array.from(new Uint8Array(buf))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        };

        const getUsers = () => {
            try {
                return JSON.parse(localStorage.getItem('fast-users') || '{}');
            } catch (e) { return {}; }
        };
        const saveUsers = (users) => {
            localStorage.setItem('fast-users', JSON.stringify(users));
        };

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Please enter username and password.');
                return;
            }
            if (username.length < 2) {
                showError('Username must be at least 2 characters.');
                return;
            }

            const users = getUsers();
            const passHash = await hashPassword(password);

            if (mode === 'signup') {
                const confirm = document.getElementById('confirm-password').value;
                if (password.length < 4) {
                    showError('Password must be at least 4 characters.');
                    return;
                }
                if (password !== confirm) {
                    showError('Passwords don\'t match.');
                    return;
                }
                if (users[username]) {
                    showError('That username is taken. Try another.');
                    return;
                }
                users[username] = {
                    username,
                    passHash,
                    createdAt: new Date().toISOString()
                };
                saveUsers(users);
                localStorage.setItem('fast-current-user', username);
                window.location.href = 'index.html';
            } else {
                const user = users[username];
                if (!user) {
                    showError('No account with that username. Create one?');
                    return;
                }
                if (user.passHash !== passHash) {
                    showError('Wrong password. Try again.');
                    return;
                }
                localStorage.setItem('fast-current-user', username);
                window.location.href = 'index.html';
            }
        });

        // If already logged in, bounce to home
        if (localStorage.getItem('fast-current-user')) {
            window.location.href = 'index.html';
        }
    })();
    </script>
</body>
</html>
